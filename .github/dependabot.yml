# Spring Boot 3.3.x 补丁对齐：仅允许 org.springframework.boot 在 3.3 线内自动 PR
version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      spring-boot-33:
        patterns:
          - "org.springframework.boot*"
    ignore:
      # 禁止 Dependabot 将 Spring Boot 升到 3.4+（主版本另开变更）
      - dependency-name: "org.springframework.boot:spring-boot-dependencies"
        versions: [">= 3.4.0"]
      - dependency-name: "org.springframework.boot:*"
        versions: [">= 3.4.0"]
