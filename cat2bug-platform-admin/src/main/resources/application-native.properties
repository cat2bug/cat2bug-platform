# Spring Native 运行时（spring.profiles.active=native，由 -Pnative 构建注入）

# 关闭 devtools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# 生产 Native 不暴露 OpenAPI UI
swagger.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
knife4j.enable=false

# embedded SPA（与 JVM embedded 一致）
spring.web.resources.static-locations=classpath:/static/

# 安装引导期 H2（与 InstallStartupSupport.BOOTSTRAP_H2_JDBC_URL 一致）
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.master.url=jdbc:h2:file:./data/.cat2bug_bootstrap;MODE=MySQL;DATABASE_TO_LOWER=TRUE;
spring.datasource.druid.master.username=root
spring.datasource.druid.master.password=cat2bug_password
spring.datasource.druid.initialSize=1
spring.datasource.druid.minIdle=1
spring.datasource.druid.maxActive=5

# Thymeleaf 模板缓存（Setup 等若走 classpath 模板）
spring.thymeleaf.cache=true

# PageHelper：Native 下禁用方言自动探测（避免反射加载 HsqldbDialect 等）
pagehelper.helperDialect=mysql

# Graal 裁剪：仅保留中文与英文 locale
spring.web.locale=zh_CN
spring.web.locale-resolver=fixed

# Spring Native 移除未使用 autoconfig（SB 3.3 默认行为，显式声明便于排查）
spring.aot.enabled=true
