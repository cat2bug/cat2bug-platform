# GitLab/自建 CI 草案；GitHub Actions 入口见 .github/workflows/spring-native.yml（两处请保持同步）
name: spring-native

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop, core]
    paths:
      - 'cat2bug-platform-admin/**'
      - 'cat2bug-platform-framework/**'
      - 'cat2bug-platform-system/**'
      - 'cat2bug-platform-common/**'
      - 'cat2bug-platform-im/**'
      - 'cat2bug-platform-ai/**'
      - 'cat2bug-platform-api/**'
      - 'cat2bug-platform-ui/**'
      - 'deploy/build-native-spring.sh'
      - 'deploy/docker/run-native-spring-minimal.sh'
      - 'deploy/docker/native-spring-minimal/**'
      - 'deploy/test/native-api-smoke.sh'
      - 'deploy/test/native-spa-smoke.sh'
      - 'deploy/test/native-h2-sql-smoke.sh'
      - 'deploy/ci/spring-native.yml'
      - '.github/workflows/spring-native.yml'

jobs:
  native-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: cat2bug-platform-ui/package-lock.json

      - name: 安装冒烟依赖（ripgrep）
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: JVM 回归测试
        run: mvn -pl cat2bug-platform-admin -am test

      - name: Spring Native 双架构构建（embedded SPA）
        env:
          SKIP_EMBEDDED: false
          UPX_SMOKE: false
        run: |
          chmod +x deploy/build-native-spring.sh
          ./deploy/build-native-spring.sh ${{ matrix.arch }}

      - name: 启动 Native Docker 容器（:2020）
        run: |
          chmod +x deploy/docker/run-native-spring-minimal.sh
          ARCH=${{ matrix.arch }} ./deploy/docker/run-native-spring-minimal.sh run-bg debian

      - name: 等待 /version 就绪
        run: |
          for i in $(seq 1 120); do
            if curl -sf http://127.0.0.1:2020/version; then
              echo ""
              exit 0
            fi
            sleep 0.5
          done
          echo "[ERROR] /version 超时" >&2
          docker logs cat2bug-spring-native-minimal 2>&1 | tail -80 || true
          exit 1

      - name: Native SPA 冒烟（静态资源 + HTML fallback）
        run: ./deploy/test/native-spa-smoke.sh http://127.0.0.1:2020

      - name: Native API 冒烟（L1–L4）
        run: ./deploy/test/native-api-smoke.sh http://127.0.0.1:2020

      - name: Native H2 SQL 冒烟（Phase 2）
        run: ./deploy/test/native-h2-sql-smoke.sh http://127.0.0.1:2020

      - name: 停止冒烟容器
        if: always()
        run: docker rm -f cat2bug-spring-native-minimal || true

      - name: 上传 Native 二进制
        uses: actions/upload-artifact@v4
        with:
          name: cat2bug-admin-spring-${{ matrix.arch }}
          path: |
            cat2bug-platform-admin/target/cat2bug-admin-linux-*
            cat2bug-platform-admin/target/cat2bug-admin-linux-*.upx
