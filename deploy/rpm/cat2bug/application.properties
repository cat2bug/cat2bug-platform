# Cat2Bug Platform Spring Native — RPM 默认配置
# systemd 通过 SPRING_CONFIG_ADDITIONAL_LOCATION 加载；安装向导写入 /var/lib/cat2bug-platform/config/install/

cat2bug.version=1.0.0
server.port=2020
server.address=0.0.0.0
server.tomcat.basedir=/var/lib/cat2bug-platform/tmp

cat2bug.install.config-path=/var/lib/cat2bug-platform/config/install/application-install.yml
cat2bug.profile=/var/lib/cat2bug-platform/upload
cat2bug.cache.type=local

spring.config.import=optional:file:/var/lib/cat2bug-platform/config/install/application-install.yml

# 引导期 H2（安装向导可切换 MySQL）；安装后 application-install.yml 覆盖 runtime 数据源
spring.database-type=h2
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.type=com.alibaba.druid.pool.DruidDataSource
spring.datasource.druid.master.url=jdbc:h2:file:/var/lib/cat2bug-platform/data/.cat2bug_bootstrap;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.druid.master.username=root
spring.datasource.druid.master.password=cat2bug_password
spring.datasource.druid.initialSize=1
spring.datasource.druid.minIdle=1
spring.datasource.druid.maxActive=5

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration/${spring.database-type}
spring.flyway.table=sys_db_version
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0.5.0

logging.file.path=/var/log/cat2bug-platform
