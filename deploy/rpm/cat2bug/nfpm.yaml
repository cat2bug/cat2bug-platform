# Spring Native RPM 打包清单（nfpm）；二进制来自 build-rpm-spring.sh 的 stage 目录
name: cat2bug-platform
arch: ${NFPM_ARCH}
platform: linux
version: ${NFPM_VERSION}
section: default
priority: optional
maintainer: Cat2Bug Team <support@cat2bug.com>
description: Cat2Bug 缺陷管理平台（Spring Native，无需 JRE）
vendor: Cat2Bug
license: MIT
homepage: https://www.cat2bug.com
depends:
  - glibc >= 2.28
contents:
  - src: stage/usr/bin/cat2bug-admin
    dst: /usr/bin/cat2bug-admin
    file_info:
      mode: 0755
  - src: stage/etc/cat2bug/platform.properties
    dst: /etc/cat2bug/platform.properties
    file_info:
      mode: 0644
  - src: stage/lib/systemd/system/cat2bug-platform.service
    dst: /lib/systemd/system/cat2bug-platform.service
    file_info:
      mode: 0644
  - dst: /var/lib/cat2bug-platform
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lib/cat2bug-platform/data
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lib/cat2bug-platform/upload
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lib/cat2bug-platform/config/install
    type: dir
    file_info:
      mode: 0755
  - dst: /var/lib/cat2bug-platform/tmp
    type: dir
    file_info:
      mode: 0755
  - dst: /var/log/cat2bug-platform
    type: dir
    file_info:
      mode: 0755
scripts:
  postinstall: scripts/postinstall.sh
